name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check conventional commit format
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            style
            docs
            test
            chore
            perf
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: |
            PR title must follow conventional commits: type(scope): description
            Allowed types: feat, fix, refactor, style, docs, test, chore, perf
            Examples:
              feat(core): add Navbar component
              fix(tokens): correct dark theme contrast
              docs: update README
